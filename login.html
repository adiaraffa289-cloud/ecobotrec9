<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EcoNusaBin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        html, body.login-page {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100%;
        }
        body.login-page {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body.login-page .login-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        body.login-page .login-box {
            margin: 0 auto;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo-login">
                    <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M30 5L35 15H25L30 5Z" fill="#22c55e"/>
                        <rect x="20" y="15" width="20" height="35" rx="3" fill="#22c55e" opacity="0.8"/>
                        <path d="M25 20H35V25H25V20Z" fill="#fff" opacity="0.3"/>
                        <circle cx="30" cy="35" r="3" fill="#fff" opacity="0.5"/>
                    </svg>
                </div>
                <h1 class="login-title">EcoNusaBin</h1>
                <p class="login-subtitle">Selamat Datang! Silakan login untuk melanjutkan</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Nama Pengguna</label>
                    <div class="input-wrapper">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 10C12.7614 10 15 7.76142 15 5C15 2.23858 12.7614 0 10 0C7.23858 0 5 2.23858 5 5C5 7.76142 7.23858 10 10 10Z" fill="#22c55e"/>
                            <path d="M10 12.5C5.02944 12.5 1 16.5294 1 21.5H19C19 16.5294 14.9706 12.5 10 12.5Z" fill="#22c55e"/>
                        </svg>
                        <input type="text" id="username" name="username" placeholder="Masukkan nama Anda" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="nisn">NISN</label>
                    <div class="input-wrapper">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="5" width="14" height="12" rx="2" stroke="#22c55e" stroke-width="2" fill="none"/>
                            <path d="M7 5V3C7 1.89543 7.89543 1 9 1H11C12.1046 1 13 1.89543 13 3V5" stroke="#22c55e" stroke-width="2"/>
                            <circle cx="10" cy="11" r="1.5" fill="#22c55e"/>
                        </svg>
                        <input type="text" id="nisn" name="nisn" placeholder="Masukkan NISN Anda" required>
                    </div>
                </div>
                
                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">Ingat saya</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-login">
                    <span>Masuk</span>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 10H16M16 10L12 6M16 10L12 14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>
            
            <div class="login-footer">
                <p>Dengan masuk, Anda menyetujui <a href="#">Syarat & Ketentuan</a> kami</p>
            </div>
        </div>
    </div>
    
    <div class="notification-container"></div>
    
    <script>
    // Data pengguna yang valid
    const validUsers = [
        { name: "Raffa", nisn: "0121997451", uid: "0174346A" },
        { name: "Warren", nisn: "0128091655", uid: "F1F53F6A" },
        { name: "Lodra", nisn: "0117048051", uid: "9185306A" },
        { name: "Nazifa", nisn: "0117081155", uid: "9172486A" },
        { name: "Damai", nisn: "0116361248", uid: "519F396A" },
        { name: "Pak Heri", nisn: "H3R1GURU", uid: "F3B14B16" },
        { name: "Resvan", nisn: "VEPANGANTENG", uid: "E0EDA65F" },
        { name: "Afif", nisn: "0128553009", uid: "B1A14B6A" },
        { name: "Dinda", nisn: "0116508528", uid: "E159396A" },
        { name: "Zhafran", nisn: "3115978148", uid: "A1D0456A" },
        { name: "Alaric", nisn: "0121754887", uid: "41A4486A " },
        { name: "Ezzar", nisn: "0126158913", uid: "5FD45186" },
        { name: "Sesya", nisn: "0116877380", uid: "E1CC346A" },
        { name: "Callista", nisn: "0119539664", uid: "81A6576A" },
        { name: "Fadhil", nisn: "3117389810", uid: "91B0566A" },
        { name: "Arvin", nisn: "0123889416", uid: "6154396A" },
        { name: "Darrel", nisn: "0117996928", uid: "7F895D86" },
        { name: "Michel", nisn: "0128979076", uid: "51C0466A" },
        { name: "Ananto", nisn: "0123933364", uid: "F182316A" },
        { name: "Revandira", nisn: "0018881054", uid: "B155426A" },
        { name: "Pak Mulyadi", nisn: "KEPALA SEKOLAH", uid: "61124C6A" },
        { name: "Pak Prihatin", nisn: "GURU", uid: "A19D376A" },
        { name: "Pak Yohanes", nisn: "GURU", uid: "0F7B5986" },
        { name: "Pak Fahiq", nisn: "GURU", uid: "BF014A86" },
        { name: "Bu Dwi", nisn: "Guru", uid: "E197366A" }
    ];
    
    // Event listener untuk form login
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Mencegah form submit default
        
        const inputName = document.getElementById('username').value.trim();
        const inputNisn = document.getElementById('nisn').value.trim();
        
        // Cari user yang cocok
        const user = validUsers.find(u => 
            u.name.toLowerCase() === inputName.toLowerCase() && 
            u.nisn === inputNisn
        );
        
        if (user) {
            // Login berhasil
            showNotification('Login berhasil! Selamat datang, ' + user.name, 'success');

            // Tandai user sudah login untuk sesi ini (dipakai index.html sebagai penjaga)
            sessionStorage.setItem('ecobottle_logged_in', 'true');

            // Simpan data user ke localStorage jika "Ingat saya" dicentang
            if (document.getElementById('remember').checked) {
                localStorage.setItem('ecobottle_user', JSON.stringify({
                    name: user.name,
                    uid: user.uid,
                    loginTime: new Date().toISOString()
                }));
            }
            
            // Redirect ke halaman utama setelah 1 detik
            setTimeout(() => {
                window.location.href = 'index.html'; // Ganti dengan halaman tujuan Anda
            }, 1000);
            
        } else {
            // Login gagal
            showNotification('Nama atau NISN salah! Silakan coba lagi.', 'error');
        }
    });
    
    // Fungsi untuk menampilkan notifikasi
    function showNotification(message, type) {
        const container = document.querySelector('.notification-container');
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        
        container.appendChild(notification);
        
        // Hapus notifikasi setelah 3 detik
        setTimeout(() => {
            notification.remove();
        }, 3000);
    }
    
    // Cek apakah user sudah login sebelumnya (remember me)
    window.addEventListener('load', function() {
        const savedUser = localStorage.getItem('ecobottle_user');
        if (savedUser) {
            const userData = JSON.parse(savedUser);
            document.getElementById('username').value = userData.name;
            document.getElementById('remember').checked = true;
        }
    });
    </script>

</body>
</html>
